[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "/api"

# Netlify Functions
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/vehicles"
  to = "/.netlify/functions/vehicles"
  status = 200

[[redirects]]
  from = "/api/test"
  to = "/.netlify/functions/test"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/simple"
  to = "/.netlify/functions/simple"
  status = 200

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200

# Admin endpoints - pointing to individual functions
[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings"
  status = 200

[[redirects]]
  from = "/api/bookings/:bookingId/status"
  to = "/.netlify/functions/booking-status"
  status = 200

[[redirects]]
  from = "/api/bookings/:bookingId"
  to = "/.netlify/functions/bookings"
  status = 200

[[redirects]]
  from = "/api/bookings/:userId"
  to = "/.netlify/functions/user-bookings"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

[[redirects]]
  from = "/api/users/:userId"
  to = "/.netlify/functions/users"
  status = 200

[[redirects]]
  from = "/api/rider-applications"
  to = "/.netlify/functions/rider-applications"
  status = 200

[[redirects]]
  from = "/api/rider-applications/:applicationId"
  to = "/.netlify/functions/rider-applications"
  status = 200

[[redirects]]
  from = "/api/debug"
  to = "/.netlify/functions/debug"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/test-simple"
  to = "/.netlify/functions/simple-test"
  status = 200

[[redirects]]
  from = "/api/test-all"
  to = "/.netlify/functions/test-all"
  status = 200

# Redirect all routes to index.html for React Router (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
